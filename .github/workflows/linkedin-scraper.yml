name: LinkedIn Scraper Daily

on:
  schedule:
    # 10 AM GMT+8 is 2 AM UTC
    - cron: '0 2 * * *'  
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Run LinkedIn Scraper
        run: |
          curl --location --request POST 'https://api.relevanceai.com/v1/studios/44b03957-a11e-4ebc-bc57-7a0dd549ee63/trigger_v2' \
            -H "Authorization: ${{ secrets.RELEVANCE_AI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "params": {
                "linkedin_creator_urls": [
                  "https://www.linkedin.com/in/dibya-ranjan-rath-b4b922100/",
                  "https://www.linkedin.com/in/aaditsh/",
                  "https://www.linkedin.com/in/a-banks/",
                  "https://www.linkedin.com/in/rowancheung/",
                  "https://www.linkedin.com/in/paul-couvert/"
                ],
                "posts_per_creator": 5,
                "rapidapi_key": "${{ secrets.RAPIDAPI_KEY }}"
              },
              "project": "${{ secrets.RELEVANCE_PROJECT_ID }}"
            }'
      
      - name: Check Status
        if: failure()
        run: echo "The workflow failed. Verify your API Key and Project ID in GitHub Secrets."
